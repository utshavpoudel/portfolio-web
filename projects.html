<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="footer.css">

</head>
<body>
    
<div id="navbar"></div>
    <script>
fetch("navbar.html")

   <div id="footer"></div>

        document.getElementById("footer").innerHTML = data;
    });
</script>

</body>
</html>
